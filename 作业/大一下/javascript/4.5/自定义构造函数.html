<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<script type="text/javascript">
		//构造函数大写开头,普通函数驼峰命名
					//自定义构造函数
					function Person(name,age){
						this.name=name;
						this.age=age;
						this.sayHi=function(){
							console.log("你好，我叫"+this.name,"我今年"+this.age+"岁");
						}
					}
					var p1 = new Person("小王","20");
					p1.sayHi();

			// 这里new做了四件事
			// 1、在内存中开辟了一个新的空间，存储创建的新对象
			// 2、把this设置为当前的对象
			// 3、设置对象的属性和方法的值
			// 4、把this这个对象返回
			function dog(name,weight){
				this.name=name;
				this.weight=weight;
				this.eat=function(){
					console.log(this.name+"，体重"+this.weight+",爱吃骨头");
				}
			}
			var dh=new dog("大黄",50);
			dh.eat();
		</script>
	</body>
</html>
