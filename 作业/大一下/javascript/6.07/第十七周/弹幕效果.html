<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  <style type="text/css">
    html, body {
      margin: 0px;
      padding: 0px;
      width: 100%;
      height: 100%;
      font-family: "微软雅黑";
      font-size: 62.5%;
    }
    
    .boxDom {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    
    .idDom {
      width: 100%;
      height: 100px;
      background: #666;
      position: fixed;
      bottom: 0px;
    }
    
    .content {
      display: inline-block;
      width: 430px;
      height: 40px;
      position: absolute;
      left: 0px;
      right: 0px;
      top: 0px;
      bottom: 0px;
      margin: auto;
    }
    
    .title {
      display: inline;
      font-size: 4em;
      vertical-align: bottom;
      color: #fff;
    }
    
    .text {
      border: none;
      width: 300px;
      height: 30px;
      border-radius: 5px;
      font-size: 2.4em;
    }
    
    .btn {
      width: 60px;
      height: 30px;
      background: #f90000;
      border: none;
      color: #fff;
      font-size: 2.4em;
    }
    
    span {
      width: 300px;
      height: 40px;
      position: absolute;
      overflow: hidden;
      color: #000;
      font-size: 4em;
      line-height: 1.5em;
      cursor: pointer;
      white-space: nowrap;
    }
  
  </style>
</head>

<body>
<script src="js/jquery-3.6.0.js" type="text/javascript" charset="utf-8"></script>
<script type="text/javascript">
	function randomColor(){
		var r=Math.floor(Math.random()*256);
		var g=Math.floor(Math.random()*256);
		var b=Math.floor(Math.random()*256);
		return "rgb("+r+","+g+","+b+")";
	}
	function speed(){
		var a=Math.floor((Math.random()*4000)+1000);
		return a;
	}
	function randomtop(){
		var b=Math.floor((Math.random()*190)+10);
		return b+'px';
	}
	var colors=["pink","gold","red","green","blue","purple","orange"]
	$(function(){
		$("#btn").click(function(){
			$("<span></span>")//创建一个span空标签
			.html($("#text").val())//给元素设置内容，从input里面拿value
			.css("color",randomColor())//给弹幕设置随机颜色
			// .css("color",colors[parseInt(Math.random()*colors.length)])
			.css("left","1024px")//设置弹幕的初始位置
			.css("top",randomtop())//设置弹幕的初始高度（随机高度10~200）
			.animate({left:-300},speed(),function(){//随机速度（1000~5000）
				$(this).remove();
			})
			.appendTo("#boxDom");
			$("#text").val("")
		})
		$("#text").keyup(function(e){
			 console.log(e);
			if(e.keyCode==13){
				$("#btn").click();
			}
		})
	})
</script>
<div class="boxDom" id="boxDom">
  <div class="idDom" id="idDom">
    <div class="content">
      <p class="title">吐槽:</p>
      <input type="text" class="text" id="text"/>
      <button type="button" class="btn" id="btn">发射</button>
    </div>
  </div>
</div>
</body>

</html>
