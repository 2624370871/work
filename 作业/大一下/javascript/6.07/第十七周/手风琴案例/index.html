<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    
    ul {
      list-style: none;
      width: 1300px;
    }
    
    #box {
      width: 1200px;
      height: 400px;
      border: 2px solid red;
      margin: 100px auto;
    }
    
    #box li {
      width: 240px;
      height: 400px;
      /*border: 1px solid #000;*/
      float: left;
	  /* background-image: url(images/1.jpg); */
    }
  
  </style>
</head>
<body>
	<script src="../js/jquery-3.6.0.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		$(function(){
			// 第一步，给每个li设置背景图片。注意每个li都图不一样
			// jq有隐式迭代的功能，很好用，但这里不适用，所以要自己写循环
			var $li=$("#box li");
			for(var i=0;i<$li.length;i++){
				$li.eq(i).css("background-image","url(images/"+(i+1)+".jpg)")
			}
			// 给每个li写鼠标移入事件
			$("#box li").mouseover(function(){
				$(this).stop().animate({width:1000},1000).siblings().stop().animate({width:50},1000)
			}).mouseout(function(){
				$("#box li").stop().animate({width:240})
			})
			
		})
	</script>
<div id="box">
  <ul>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>
  </ul>
</div>

</body>
</html>
