<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			div{
				width: 200px;
				height: 200px;
				background-color: pink;
				/* left: 800px; */
				position: relative;
			}
			#box2{
				background-color: #008080;
			}
			#box3{
				background-color: goldenrod;
			}
		</style>
	</head>
	<body>
		<input type="button" name="" id="" value="开始" />
		<div id="box1"></div>
		<div id="box2"></div>
		<div id="box3"></div>
		<script src="js/jquery-3.6.0.js" type="text/javascript" charset="utf-8"></script>
		<script type="text/javascript">
			// jquery里自定义动画用animate（），共4个参数
			$(function(){
				$("input").click(function(){
					//让盒子往右移动800px
					// animated的参数
					// 第一个参数为必选从参数，对象类型，表示动画效果
					// $("div").animate({left:800});
					// 第二个参数为可选参数，speed。动画持续时间（ms）
					$("#box1").animate({left:800},3000);
					// 第三个参数可选，运动曲线，swing（默认），linear(直线)
					$("#box2").animate({left:800},3000,"swing");
					$("#box3").animate({left:800},3000,"linear");
					// 第四个参数，可选，回调函数，当动画完成后调用执行
					$("#box1").animate({left:800},3000,function(){
						console.log("我到了")
					});
				})
			})
		</script>
	</body>
</html>
