<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<style type="text/css">
		</style>
	</head>
	<body>
		<script type="text/javascript">
		function color(){
			var r=Math.floor(Math.random()*256);
			var g=Math.floor(Math.random()*256);
			var b=Math.floor(Math.random()*256);
			return "rgb("+r+","+g+","+b+","+")";
		}
		console.log(color());
		
		//计算时间差
		function getInterval(start, end){
			var t=end-start;
			t/=1000;
			var day=Math.round(t/60/60/24);
			var h=Math.round(t/60/60%24);
			var m=Math.round(t/60%60);
			var s=Math.round(t%60);
			return {
				day:day,
				hour:h,
				minute:m,
				second:s
			};
		}
		var obj=getInterval(new Date("2022-4-1"),new Date());
		console.log(obj.minute);
		</script>
	</body>
</html>
