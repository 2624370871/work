<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			#div1 {
				width: 300px;
				height: 300px;
				background-color: aquamarine;
			}

			#div2 {
				width: 200px;
				height: 200px;
				background-color: pink;
			}

			#div3 {
				width: 100px;
				height: 100px;
				background-color: bisque;
			}
		</style>
	</head>
	<body>
		<div id="div1">琪琪
			<div id="div2">恰恰
				<div id="div3">蹦蹦</div>
			</div>
			<script type="text/javascript">
				var d1 = document.getElementById("div1");
				var d2 = document.getElementById("div2");
				var d3 = document.getElementById("div3");

				//默认：冒泡事件,在冒泡阶段执行的事件,从内向外执行
				// d1.onclick = function() {
				// 	alert("my name is 琪琪");
				// }
				// d2.onclick = function() {
				// 	alert("my name is 恰恰");
				// }
				// d3.onclick = function() {
				// 	alert("my name is 蹦蹦");
				// }
				
				// 捕获事件：在捕获阶段执行的事件，从外向内依次执行
				// 只能使用事件监听做到，第三个参数改为true即为捕获方式
				// 第三个参数省略或为false，为冒泡排序
				d1.addEventListener("click",function(){
					alert("my name is 琪琪")
				},true)
				d2.addEventListener("click",function(){
					alert("my name is 恰恰")
				},true)
				d3.addEventListener("click",function(){
					alert("my name is 蹦蹦")
				},true)
			</script>
	</body>
</html>
