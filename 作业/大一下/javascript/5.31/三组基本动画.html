<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<style type="text/css">
		#test{
			width: 300px;
			height: 300px;
			background-color: pink;
			display: none;
		}
	</style>
	<script src="js/jquery-3.6.0.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		$(function(){
			$("input").eq(0).click(function(){
				// show不传参数，没有动画效果
				// $("#test").show();
				// show(speed),speed指的是动画的持续时间，毫秒为单位整数值或字符串
				// $("#test").show(3000);
				// $("#test").show('slow');//fast/normal/slow
				// show(speed,easing)
				// $("#test").show(2000,'linear');
				// show(speed,easing,fn);
				$("#test").show(2000,function(){
					console.log("我是显示动画")
				});
				$("input").eq(1).click(function(){
					$("#test").hide();
				});
				$("input").eq(2).click(function(){
					$("#test").slideUp(1000);
				});
				$("input").eq(3).click(function(){
					$("#test").slideDown(1000);
				});
				$("input").eq(4).click(function(){
					$("#test").slideToggle(1000);
				});
				$("input").eq(5).click(function(){
					$("#test").fadeIn(1000);
				});
				$("input").eq(6).click(function(){
					$("#test").fadeOut(1000);
				});
				$("input").eq(7).click(function(){
					$("#test").fadeToggle(1000);
				});
			})
		})
	</script>
	<body>
		<input type="button" value="show">
		<input type="button" value="hide">
		<input type="button" value="slideUp">
		<input type="button" value="slideDown">
		<input type="button" value="slideToggle">
		<input type="button" value="fadeIn">
		<input type="button" value="fadeOut">
		<input type="button" value="fadeToggle">
		<div id="test"></div>
	</body>
</html>
