<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<style type="text/css">
			.father{
				background: #ccc;
				border: 1px dashed #999;
			}
			.box1,.box2,.box3{
				height: 50px;
				line-height: 50px;
				background: #f9c;
				border: 1px dashed #999;
				margin: 15px;
				padding: 0px 10px;
				float: left;
				
			}
.p{
	background: #ccf;
	border: 1px dashed #999;
	margin: 15px;
	padding: 0px 10px;
	clear: both;
}
		</style>
	</head>
	<body>
		<div class="father">
			<div class="box1">box1</div>
			<div class="box2">box2</div>
			<div class="box3">box3</div>
			<p class="p">有些人，在你生命里，走着走着就散了，走着走着就远了，转身是刹那，离别早已是天涯。有些人，如同在你的世界打马而过，走时如春风拂面，未曾留下一丝一痕。有些人，走时却如惊涛骇浪，让你痛彻心扉，就像长在你心里的一根刺，怎么拨也拨不出来，只留下浅浅淡淡的伤痕，也许，是思念;也许，是怨念;也许，只是记得……</p>
		</div>
	</body>
</html>
