<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			h2{
				border-style: double;
			}
			.one{
				border-top-style: dotted;
				border-bottom-style: dotted ;
				border-left-style: soild;
				border-right-style: soild;
			}
			.two{
				border-style: soild dotted dashed;
			}
		</style>
	</head>
	<body>
		<h2>边框样式——双实线</h2>
		<p class="one">边框样式——上下为点线，左右为单实线</p>
		<p class="two">边框样式——上边框为单实线，左右点线，下边框虚线</p>
	</body>
</html>
