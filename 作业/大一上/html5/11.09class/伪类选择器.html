<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			p:first-child{
				color: red;
				font-size: 20px;
			}
			p:last-child{
				color: orange;
				font-size: 30px;
			}
			p:nth-child{
				color: red;
				font-size: 40px;
			}
			p:nth-last-child(2){
				color: green;
				font-size: 50px;
			}
		</style>
	</head>
	<body>
	<div id="one">
	<p>first-child选择器</p>
	<p>第一段</p>
	<p>第二段</p>
	<p>第三段</p>
	<p>第四段</p>
	<p>last-child选择器</p>
	</div>	
	</body>
</html>
