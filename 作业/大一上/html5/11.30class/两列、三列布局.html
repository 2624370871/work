<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	<style type="text/css">
			body{
				margin: 0px;
				padding: 0px;
				font-size: 24px;
				text-align: center;
			}
			div{
				width: 980px;
				margin: 5px auto;
				background: #D2EBFF;
			}
			#top{
				height: 40px;
			}
			#nav{
				height: 60px;
			}
			#banner{
				height: 200px;
			}
			#connet{
				height: 200px;
			}
			#footer{
				height: 90px;
			}
			.content_left{
				width: 350px;
				height: 200px;
				background-color: #ccc;
				float: left;
				margin: 0;
			}
			.content_right{
				width: 350px;
				height: 200px;
				background-color: #ccc;
				float: right;
				margin: 0;
			}
			.content_middle{
				width: 200px;
				height: 200px;
				background-color: #ccc;
				float: left;
				margin: 0 0 0 40px;
			}/* 中间部分布局样式 */
		</style>
	</head>
	<body>
		<div id="top">头部</div>
		<div id="nav">导航栏</div>
		<div id="banner">焦点图</div>
		<div id="connet">
			<div class="content_left">
				内容左部分
			</div>
			<div class="content_middle">
				内容中间部分
			</div>
			<div class="content_right">
				内容右部分
			</div>
		</div>
		<div id="footer">页面底部</div>
		
	</body>
</html>
