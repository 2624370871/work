<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			
			div{
				width: 260px;
				height: 170px;
				background: aqua center center no-repeat;
				overflow: visible;/* 溢出内容呈现在标签框之外 */
				overflow: hidden;/* 溢出内容被修剪,且不可见 */
				overflow: auto;/* 根据需要产生滚动条 */
			 position: absolute;
			    top: calc(50% - 150px);
			    left: calc(50% - 150px);
				
			}
		</style>
	</head>
	<body>
		<div >
		遇见你是对？还是认识你是错？寻求答案，至今结果都是无言的沉默。什么时候被你拉黑？我选择了回忆，什么时间让你走出我的梦？我懂得了珍惜。我们的故事，也只归于沉默。如此结局，月光拥了相思，云淡了风轻。
		从来就没想让你哭，想让你在我心中永驻。也想要你和我一起看着月色的怜惜，吻着时间里面的心意，只想一起走过严寒酷暑，一起看日出日落，一起看月的阴晴圆缺。我没想明白，你为什么把我赶出你的心房？
		让我一个人重新流浪，可能是我太在乎你，也可能是我忘了情的苦，所以才让你伤害我，才会这样折磨我	
		</div>
	</body>
</html>
