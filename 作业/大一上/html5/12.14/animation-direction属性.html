<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			div{
				width: 200px;
				height: 150px;
				border-radius: 50%;
				background: #f60;
				animation-name: mymove;
				animation-duration: 2s;
				animation-iteration-count: 4;
				animation-direction: alternate;
			}
			@keyframes mymove{
				from{transform: translate(0) rotateZ(0deg);}
				to{transform: translate(1000px) rotateZ(1080deg);}
			}
		</style>
	</head>
	<body>
		<div></div>
	</body>
</html>
