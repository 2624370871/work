<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			div{
				margin:0 auto;
				margin-top:300px;
				width: 600px;
				height: 600px;
				border: 2px solid #000;
				position: relative;
				transition: all 1s ease 0s;
				position: relative;
				transform-style: preserve-3d;
			}
			img{
				position: absolute;
				top: 50px;
				left: 50px;
				transform: rotateZ(100px);
			}
			.no2{
				transform: rotateX(90deg) translateZ(100px);
			}
			div:hover{
				transform: rotatex(-90deg);
			}
			div:visited{
				transform: rotatey(-90deg);
				transition: all 1s ease 0s;
				transform-style: preserve-3d;
			}
		</style>
	</head>
	<body>
		<div class="">
			<img class="no1" src="img/7.jpg" alt="1">
			<img class="no2" src="img/8.jpg" alt="2">
		</div>
	</body>
</html>
