<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<style type="text/css">
			div{
				width: 400px;
				height: 100px;
				background-color: orange;
				font-weight: bold;
				color: #fff;
			}
			div:hover{
				color: blue;
				background-color: pink;
				transition-property: background-color;
				transition-duration: 2s;
			}
		</style>
	</head>
	<body>
		<div id="">
			使用transition-property属性改变元素背景色
		</div>
	</body>
</html>
