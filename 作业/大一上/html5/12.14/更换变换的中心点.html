<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			#div1{
				position: relative;
				width: 200px;
				height: 200px;
				margin: 100px auto;
				padding: 10px;
				border: 1px solid black;
			}
			#box1{
				padding: 20px;
				position: absolute; 
				border: 1px solid black;
				background-color: red;
				transform: rotate(45deg);
				transform-origin: 20% 40%;
			}
			#box2{
				padding: 20px;
				position: absolute; 
				border: 1px solid black;
				background-color: #ff0;
				transform: rotate(45deg);
			}
		</style>
	</head>
	<body>
		<div id="div1">
			<div id="box1">
				更改基点位置
			</div>
			<div id="box2">
				未更改基点位置
			</div>
		</div>
	</body>
</html>
