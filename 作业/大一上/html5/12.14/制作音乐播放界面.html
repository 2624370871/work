<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			#box-video{
				width: 100%;
				height: 100%;
				position: absolute;
				overflow: hidden;
			}
			#box-video video{
				position: absolute;
				width: 100%;
				height: 100%;
				
			}
			.cd{
				width: 422px;
				height: 422px;
				position: absolute;
				top: 15%;
				left: 10%;
				z-index: 2;
				border-radius: 50%;
				border: 10px solid #fff;
				box-shadow: 5px 5px 15px #000;
				background: url(img/5.jpg) no-repeat;
			}
			.center{
				width: 100px;
				height: 100px;
				background-color: #000;
				border-radius: 50%;
				position: absolute;
				top: 50%;
				left: 50%;
				margin-left: -50px;
				margin-top: -40px;
				z-index: 3;
				border: 5px solid #fff;
				background-image: url(img/3.jpg);
				background-position: center center;
				background-repeat: no-repeat;
			}
			.song{
				position: absolute;
				top: 25%;
				left: 50%;
			}
			h2{
				margin-top: -10px;
				font-family: "微软雅黑";
				font-size: 110px;
				color: #913805;
			}
			p{
				width: 520px;
				height: 600px;
				line-height: 30px;
				padding-left: 30px;
				background: url(img/4.jpg) repeat-x;
				box-sizing: border-box;
			}
		</style>
	</head>
	<body>
		<div id="box-video">
			<video src="img/2.mp4" autoplay="autoplay" loop> 浏览器不支持video标签</video>
			<div class="cd">
				<div class="center"></div>
				</div>
				<div class="song">
					<h2>风中的麦浪</h2>
					<p>爱过的地方<br>当微风带着收获的味道<br>吹向我脸庞<br>想起你轻柔地话语<br>曾打湿我的眼眶<br>嗯-啦-嗯-啦<br>我们曾在田野里歌唱<br>在冬季盼望<br>却没等到阳光下</p>
					<audio src="img/1.mp3" autoplay="autoplay" loop >
						当前浏览器不支持audio
					</audio>
				</div>
			</div>
		
	</body>
</html>
