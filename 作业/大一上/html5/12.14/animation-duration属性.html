<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			.box{
				margin: 0 auto;
				width: 700px;
				height: 700px;
				border: 5px solid green;
				border-radius: 20px;
			}
			img{
				width: 200px;
				animation-name: mymove;
				animation-duration:10s;
				animation-iteration-count: 10;
			}
			@keyframes mymove{
				from{transform: translate(0) rotate(180deg);}
				25%{transform: translate(500px) rotate(180deg);}
				50%{transform: translate(500px,500px) rotate(270deg);}
				75%{transform: translate(0px,500px) rotatey(360deg);}
				100%{transform: translate(0px,0px) rotate(90deg);}
			}
		</style>
	</head>
	<body>
		<div class="box">
		<img src="img/1.gif" >
		</div>
	</body>
</html>
