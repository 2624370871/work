<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<form action="#" method="get">
			账&nbsp;&nbsp;&nbsp;&nbsp;号<input type="text"name="username" pattern="^[a-zA-Z][a-zA-z0-9]{4,15}$">(以字母开头，长度在4~16字节，允许字母、数字、下划线)<br />
			密&nbsp;&nbsp;&nbsp;&nbsp;码<input type="password"name="pwd" pattern="^[a-zA-Z][a-zA-z0-9]\w{5,17}$">(以字母开头，长度在4~16字节，允许字母、数字、下划线)<br />
			身份证号：<input type="text"name="mycard" pattern="^d\{15|\d{18}}$">(15、18位数字)<br />
			email地址：<input type="email" name="myemail" id="" value=""  pattern="^\w+([-+.]\w+)*@\w+([-.]\w+)*\.\w+([-.]]w+)*$" />
			<input type="submit" name="" id="" value="提交" />
		</form>
	</body>
</html>
