<html>
	<head>
		<meta charset="utf-8">
		<title></title>

		<style type="text/css">
			body,ul,li,p,h1,h2,h3,img{margin: 0;padding: 0;border: 0;list-style:none;}
			.lian{
				width: 200px;
				height: 200px;
				border-radius: 50%;
				background: #fcd671;
				margin: 100px auto;
				position: relative;
			}
			.meimao{
				width: 30px;
				height: 30px;
				border-radius: 50%;
				border-top: 4px solid #000;
			}
			.meimao1{
				position: absolute;
				left: 20%;
				top: 14%;
				transform: rotate(20deg);
			}
			.meimao2{
				position: absolute;
				left: 65%;
				top: 14%;
				transform: rotate(-20deg);
			}
			.yanjing{
				width: 70px;
				height: 20px;
				background: #fff;
				border-radius: 50%;
			}
			.yanjing1{
				position: absolute;
				left: 10%;
				top: 30%;
			}
			.yanjing2{
				position: absolute;
				left: 55%;
				top: 30%;
			}
			span{
				display: block;
				width: 12px;
				height: 12px;
				background: #000;
				border-radius: 50%;
				transform: translate(3px,4px);
				animation: yanzhu 3s linear 2s infinite alternate;
			}
			.zui{
				width: 114px;
				height: 100px;
				border-radius: 50%;
				border-bottom: 3px solid #000;
				position: absolute;
				left: 22%;
				top: 28%;
			}
			@keyframes yanzhu{
				from{transform: translate(3px,4px) scale(1);}
				10%{transform: translate(3px,4px) scale(1);}
				30%{transform: translate(24px,4px) scale(3);opacity: 0;}
				31%{transform: translate(24px,4px) scale(3);opacity: 1;
				background: url(img/xin.png) center center no-repeat;
				background-size: 11px 9px;
				}
				69%{transform: translate(24px,4px) scale(3);opacity: 1;
				background: url(img/xin.png) center center no-repeat;
				background-size: 11px 9px;
				}
				70%{transform: translate(24px,4px) scale(3);opacity: 0;}
				80%{transform: translate(52px,4px) scale(1);}
				to{transform: translate(52px,4px) scale(1);}
			}
			.box{
				margin: 0 auto;
				width: 700px;
				height: 700px;
				border: 5px solid green;
				border-radius: 20px;
			}
			img{
				width: 200px;
				animation-name: mymove;
				animation-duration:10s;
				animation-iteration-count: 10;
			}
			@keyframes mymove{
				from{transform: translate(0) rotate(180deg);}
				25%{transform: translate(500px) rotate(180deg);}
				50%{transform: translate(500px,500px) rotate(270deg);}
				75%{transform: translate(0px,500px) rotatey(360deg);}
				100%{transform: translate(0px,0px) rotate(90deg);}
			}
		</style>
	</head>
	<body>
		<div class="box">
		<img src="img/1.gif" >
		<div class="lian">
			<p class="meimao1 meimao"></p>
			<p class="meimao2 meimao"></p>
			<p class="yanjing1 yanjing">
			<span></span>
			</p>
			<p class="yanjing2 yanjing">
			<span></span>
			</p>
			<p class="zui"></p>
		</div>
		</div>
	</body>
</html>
