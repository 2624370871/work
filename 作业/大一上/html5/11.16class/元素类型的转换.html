<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			div,span{
				width: 200px;
				height: 50px;
				background: #FCC;
				margin: 20px;
			}
			.d-one,.d-two{
				display: inline;
			}
			.s-one{
				display: inline-block;
			}
			.s-three{
				display:block ;
			}
			/* .d-three{
				display: none;
			} */
		</style>
	</head>
	<body>
		<div class="d-one">第一个div中的文本</div>
		<div class="d-two">第二个div中的文本</div>
		<div class="d-three">第三个div中的文本</div>
		<span class="s-one">第一个span中的文本</span>
		<span class="s-two">第二个span中的文本</span>
		<span class="s-three">第三个span中的文本</span>
	</body>
</html>
