<!DOCTYPE html>
<html>
	<head>
		<!-- white=device-width表示当前窗口宽度等于100%，initial-scale=1表示缩放级别为1，
		ser-scalable=no表示禁止页面缩放 -->
		<meta name="viewport" content="white=device-width,
		initial-scale=1,user-scalable=no"/>
		<meta charset="utf-8">
		<title>电商网</title>
	</head>
	<link rel="stylesheet" type="text/css" href="./css/shop.css"/>
	<body>
		<div id="top">
			<div class="brand">电商网</div>
			<!-- 表单采用get提交 -->
			<form action="" method="get">
				<!-- input的type使用的是HTML5新属性search -->
				<input type="search" placeholder="搜索" />
			</form>
			<!-- 注册链接 -->
			<a href="">注册</a>
		</div>
		
		<div class="content">
			<div class="pic_info">
				<!-- 商品图片展示 -->
				<div class="pic_box">
					<img src="./img/redmi.jpg" alt="商品" >
				</div>
				<ul>
					<li>商品名称：redmiK40</li>
					<li>商品价格：2000</li>
					<li>交易数量：9999</li>
				</ul>
			</div>
		</div>
		<div class="content">
			<div class="pic_info">
				<!-- 商品图片展示 -->
				<div class="pic_box">
					<img src="./img/tx.png" alt="商品" >
				</div>
				<ul>
					<li>商品名称：天选2</li>
					<li>商品价格：7999</li>
					<li>交易数量：9999</li>
				</ul>
			</div>
		</div>
		<div class="content">
			<div class="pic_info">
				<!-- 商品图片展示 -->
				<div class="pic_box">
					<img src="./img/bh.jpg" alt="商品" >
				</div>
				<ul>
					<li>商品名称：北海巨妖</li>
					<li>商品价格：299</li>
					<li>交易数量：9999</li>
				</ul>
			</div>
		</div>
	</body>
</html>
