<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
	</head>
	<body style="text-align: center;">
		<video width="800px" height="600px" id="video" controls>
			<source src="img/gakki.mp4">
		</video>
		<br>
		<button  onclick="playPause()">播放暂停</button>
		<script>
			var v=document.getElementById("video");
			function playPause(){
				if (v.paused){
					v.play();
				} else{
					v.pause();
				}
			}
		</script>
	</body>
</html>
