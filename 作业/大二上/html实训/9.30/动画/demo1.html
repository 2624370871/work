<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
			div{
				height:30px;
				width: 100px;
				line-height: 30px;
				border-radius: 5px;
				color: #000;
				background-color: silver;
				transition: all 2s ease;
				text-align: center;
				margin-bottom: 10px;
			}
			.box1:hover{
				color: white;
				background-color: #45B853;
				transform: scale(1.1);
			}
			@keyframes mycolor {
				0% {background-color: red;}
				30% {background-color: blue;}
				60% {background-color: green;}
				100% {background-color: yellow;}
			}
			.box2:hover{
				animation: mycolor 5s linear;
				animation-iteration-count: infinite;
			}
		</style>
	</head>
	<body>
		<div class="box1">web 前端</div>
		<div class="box2">web 前端</div>
	</body>
</html>
