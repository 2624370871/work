<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<style type="text/css">
			.parent{
				align-items: center;
				width: 1000px;
				height: 1000px;
				display: flex;
				justify-content: space-around;
				margin: 0 auto;
				perspective: 1000px;
			}
			img{
				width: 400px;
				height: 400px;
			}
			.box{
				padding: 20px;
			}
			.x:hover{
				transform-style:preserve-3d;
				transform: rotateX(60deg);
				transition: all 1s linear; 
			}
			.y:hover{
				transform-style:preserve-3d;
				transform: rotateY(60deg);
				transition: all 1s linear; 
			}
			.z:hover{
				transform-style:preserve-3d;
				transform: rotateZ(60deg);
				transition: all 1s linear; 
			}
		</style>
	</head>
	<body>
		<div class="parent">
			<div class="box x">
				<img src="./img/qw.png"/>
			</div>
			<div class="box y">
				<img src="./img/qw.png"/>
			</div>
			<div class="box z">
				<img src="./img/qw.png"/>
			</div>
		</div>
	</body>
</html>
