<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="white=device-width,initial-scale=1"/>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<header width="375px" align="center"><h3>创建房屋</h3></header>
		<article align="center">
			<form action="#" method="get">
				房屋名称:
				<input type="text" spellcheck="true" placeholder="请输入名称" required="required"/><span>*</span>
				<br><br>
				房屋面积：
				<input type="text" spellcheck="true" placeholder="请输入名称" required="required"/><span>*</span>
				<br><br>
				房屋类型：
				<select>
					<option value ="单间">单间</option>
					<option value ="套房">套房</option>
				</select><span>*</span>
				<br><br>
				房间数量:<input type="number"min="1" max="5" /><br><br>
				房屋建成时间：<input type="date" name="" id="" value="" /><br><br>
				上传图片：
				<input type="file" accept="image/gif,house.png" multiple="multiple"/><br><br>
				<textarea placeholder="输入房屋信息..."></textarea><br><br>
				<input type="submit" value="创建" />
			</form>
		</article>
	</body>
</html>
