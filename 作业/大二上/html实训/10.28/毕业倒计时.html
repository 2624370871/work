<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			#main{
				display: flex;
				flex-direction: row;
			}
			#main div{
				width: 100px;
				height: 50px;
				background-color: rgba(135,206,250,0.2);
				margin-left: 20px;
				font-size: 20px;
				line-height: 50px;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<h1>毕业倒计时</h1>
		<div id="main">
			<div id="dDiv"></div>
			<div id="hDiv"></div>
			<div id="mDiv"></div>
			<div id="sDiv"></div>
		</div>
		<script type="text/javascript">
			var endTime=new Date("2023-06-22 24:00:00");
			setInterval(times,1000);
			function times(){
				var nowTime=+new Date();
				var count=(endTime-nowTime);
				var d=parseInt(count/(1000*60*60*24));
				var h=parseInt(count/(1000*60*60)%24);
				var m=parseInt(count/(1000*60)%60);
				var s=parseInt(count/1000%60);
				d=d=d<10?"0"+d:d;
				h=h<10?"0"+h:h;
				m=m<10?"0"+m:m;
				s=s<10?"0"+s:s;
				document.getElementById("dDiv").innerHTML=d+"天";
				document.getElementById("hDiv").innerHTML=h+"时";
				document.getElementById("mDiv").innerHTML=m+"分";
				document.getElementById("sDiv").innerHTML=s+"秒";
			}
		</script>
	</body>
</html>
