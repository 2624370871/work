<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<style>
			*{
				margin: 0;
				padding: 0;
			}
			header{
				text-align: center;
				margin-bottom: 15px;
			}
			#box{
				margin: 20px auto 0;
				width: 300px;
				text-align: center;
			}
			#bonus{
				height: 50px;
				width: 280px;
				background-color: #f3f3f3;
			}
			#benefit{
				height: 20px;
				width: 140px;
			}
			#roles{
				height: 22px;
				width: 130px;
				vertical-align: bottom;
			}
			#count{
				padding-top: 10px;
				padding-right: 11px;
				text-align: right;
			}
			#countBtn{
				height: 25px;
				width: 70px;
				text-align: center;
				background-color: #ffffff;
				cursor: pointer;
			}
			#dadaBox{
				padding: 10px 0;
			}
			#benefit,#roles,#countBtn,#bonus{
				border: 1px solid #d4d4d4;
			}
		</style>
		<script src="./js/index.js"></script>
	</head>
	<body>
		<div id="box">
			<header>项目提成计算器</header>
			<div id="dataBox">
				<input type="text" id="bonus" placeholder="项目提成" readonly="readonly"/>
			</div>
			<input type="text" id="benefit" value="0" />
			<select id="roles">
				<option value ="1">程序员</option>
				<option value ="2">项目经理</option>
				<option value ="3">销售人员</option>  
			</select>
			<div id="count">
				<input type="button" id="countBtn" value="计算" onclick="countFun()"/>
			</div>
		</div>
	</body>
</html>
