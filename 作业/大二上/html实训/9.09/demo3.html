<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
		*{
			margin: 0;
			padding: 0;
		}
		ul{
			width: 300px;
			margin: 0 auto;
			font-size: 0;
			margin-top: 30px;
		}
		a{
			text-decoration: none;
			display: inline-block;
			width: 90px;
			height: 35px;
			text-align: center;
			border-bottom: 1px solid #b3b3b3;
			font-size: 18px;
			
		}
		a:hover{
			background-color: #B3B3B3;
			color: white;
			border: 1px solid;
			border-top-color: orange;
			border-left-color: orange;
			border-right-color: orange;
		}
		</style>
	</head>
	<body>
		<ul>
			<a href="">链接1</a>
			<a href="">链接2</a>
			<a href="">链接3</a>
		</ul>
	</body>
</html>
