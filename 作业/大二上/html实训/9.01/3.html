		<p>根据《湖北科技职业学院优秀毕业生评选办法》和《关于开展2022届优秀毕业生评选工作的通知》，经过本人申请，学院初评，学工部审核，拟授予赵永科等338名同学“湖北科技职业学院2022届优秀毕业生”荣誉称号。现予以公示（名单详见附件）。公示时间为2022年5月27日至5月31日。

如对拟表彰人选有异议，请于公示期内通过电话、来访等形式向学工部反映。以单位名义反映情况的材料需单位负责人签字并加盖单位公章，以个人名义反映情况的材料应署实名，并提供联系方式。</p>
