<!DOCTYPE html>
<html>
	<head>

<style type="texts">
	input{
		display:block;
		margin:0 auto;
		border:2px solid greenyellow;
	}
	#txtId{
		display:block;
		width:80px;
		height:120px;
		text-align:center;
		line-height:120;
		font-size:28px;
		margin-bottom:20px;
	}

</style>

</head>
<body>
	<input id="txt" type="text"/><br>
	<input type="button" value="验证码" onclick="rand()"/>
	<script type="text/javascript">
		function rand(){
		var str="0123456789abcdefjhigklmnopqrstuvwxyz";
		var result="";
		for(var i=0; i<4; i++){
			var num=parseInt(Math.random()*str.length);
			result=result+str.charAt(num);
		}
		document.getElementById("txt").value=result;
	}
	</script>
	
</body>
